<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>次元大战 3D · Dimensional War</title>
  <meta name="theme-color" content="#0c0c1d">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="次元大战">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="c3d"></canvas>

  <!-- 加入界面 -->
  <div id="join-screen">
    <h1 class="title">🌌 次元大战 3D</h1>
    <p class="subtitle">实时动作战斗 · 多人在线 · 次元重叠战场</p>
    <div class="join-box">
      <input id="join-name" type="text" maxlength="12" placeholder="输入你的降临者之名">
      <div id="dim-cards" class="dim-cards"></div>
      <div id="class-cards" class="class-cards"></div>
      <button id="btn-join" class="btn primary wide">⚔️ 降临次元</button>
      <div class="preview-hint">⬇ 选择次元与职业，预览你的英雄 ⬇</div>
    </div>
    <div class="controls-help">
      <b>操作：</b> WASD 移动 ｜ 按住右键拖动转视角 ｜ 滚轮缩放 ｜ B 属性/背包/商店<br>
      鼠标左键 普攻 ｜ Q/E/R 职业技能 ｜ 空格 翻滚闪避 ｜ F 捕捉宝宝(猎人专属)<br>
      <span class="dim-text">打怪升级拿技能点，装备掉落+商店购物 → 等待「次元重叠」→ 进入重叠战场与敌对次元玩家实时厮杀，击杀掠夺金币！</span>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="top-left">
      <div id="room-name"></div>
      <div class="bar hpbar"><div id="hp-fill"></div><span id="hp-text"></span></div>
      <div class="bar expbar"><div id="exp-fill"></div></div>
      <div id="stat-line"></div>
    </div>

    <div id="war-banner" class="hidden">
      <span id="war-text"></span>
      <button id="btn-war" class="btn war hidden"></button>
    </div>
    <div id="boss-banner" class="hidden"><span id="boss-text"></span></div>
    <div id="melee-banner" class="hidden"><span id="melee-text"></span><button id="btn-melee" class="btn"></button></div>
    <div id="levelup-banner" class="hidden"></div>
    <div id="party-hud"></div>
    <div id="invite-prompt" class="hidden">
      <span id="invite-text"></span>
      <button id="btn-inv-yes" class="btn">✅ 接受</button>
      <button id="btn-inv-no" class="btn">✕</button>
    </div>

    <div id="feed"></div>

    <div id="skill-bar">
      <div class="skill-slot" id="sk-basic"><span class="key">左键</span><span class="sk-name">普攻</span><span class="sk-lv"></span><button class="sk-plus hidden">＋</button><div class="cd"></div></div>
      <div class="skill-slot" id="sk-q"><span class="key">Q</span><span class="sk-name">技能</span><span class="sk-lv"></span><button class="sk-plus hidden">＋</button><div class="cd"></div></div>
      <div class="skill-slot" id="sk-e"><span class="key">E</span><span class="sk-name">技能</span><span class="sk-lv"></span><button class="sk-plus hidden">＋</button><div class="cd"></div></div>
      <div class="skill-slot" id="sk-r"><span class="key">R</span><span class="sk-name">技能</span><span class="sk-lv"></span><button class="sk-plus hidden">＋</button><div class="cd"></div></div>
      <div class="skill-slot" id="sk-dodge"><span class="key">空格</span><span class="sk-name">翻滚</span><div class="cd"></div></div>
      <div class="skill-slot hidden" id="sk-pet"><span class="key">F</span><span class="sk-name">捕捉</span><div class="cd"></div></div>
    </div>

    <!-- 首次使用技能介绍 -->
    <div id="skill-intro" class="hidden"></div>

    <!-- 属性/背包/商店 面板 -->
    <div id="panel" class="hidden">
      <div class="panel-head">
        <button class="panel-tab active" data-tab="stats">📊 属性</button>
        <button class="panel-tab" data-tab="bag">🎒 背包·装备</button>
        <button class="panel-tab" data-tab="shop">🛒 商店</button>
        <button class="panel-tab" data-tab="rank">🏆 排行</button>
        <button class="panel-tab" data-tab="party">👥 队伍</button>
        <button class="panel-tab" data-tab="ach">🏅 成就</button>
        <button id="btn-panel-close">✕</button>
      </div>
      <div id="panel-body"></div>
    </div>

    <!-- 背包 / 退出（对局内） -->
    <button id="btn-bag" class="btn mute-btn bag-btn">🎒</button>
    <button id="btn-chat" class="btn mute-btn chat-btn">💬</button>
    <button id="btn-exit" class="btn mute-btn exit-btn">🚪</button>
    <div id="chatbar" class="hidden">
      <input id="chat-input" maxlength="60" placeholder="说点什么…（Enter发送 / Esc关闭）" autocomplete="off">
    </div>
  </div>

  <!-- 受击红屏 -->
  <div id="hurt" class="hidden"></div>

  <!-- 死亡界面 -->
  <div id="death" class="hidden">
    <div class="death-box">
      <h2>💀 你已阵亡</h2>
      <p>复活倒计时 <span id="death-cd"></span></p>
      <button id="btn-respawn" class="btn primary">立即复活</button>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <!-- 静音切换 -->
  <button id="btn-mute" class="btn mute-btn">🔊</button>

  <!-- 移动端虚拟摇杆 + 攻击键（仅触屏显示） -->
  <div id="joy" class="hidden"><div id="joy-knob"></div></div>
  <button id="btn-atk" class="atk-btn">⚔️</button>

  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.min.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from './vendor/GLTFLoader.js';
    import { clone as skeletonClone } from './vendor/SkeletonUtils.js';
    window.THREE = THREE;
    window.GLTFLoader = GLTFLoader;
    window.skeletonClone = skeletonClone;
  </script>
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/models.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
